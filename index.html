<!-- DIGIY EXPLORE PUBLIC — PATCH DOCTRINE FINAL
À coller juste avant </body> dans BEAUVILLE/digiy-explore/index.html

Public = découvrir / comprendre / partager.
PRO = cockpit / lieux / ajouter / PIN.
Camembert = pilotage PRO.
Audio = lecteur séparé.
-->

<style>
  body.digiy-place-not-found .pro-band,
  body.digiy-place-not-found #proSection{display:none!important}

  #digiyPublicAudioReader{
    position:fixed;right:14px;bottom:calc(86px + env(safe-area-inset-bottom,0px));
    z-index:99998;display:flex;align-items:center;gap:8px;
    max-width:min(340px,calc(100vw - 118px));padding:9px 10px;
    border-radius:999px;border:1px solid rgba(242,204,120,.24);
    background:rgba(6,19,15,.94);box-shadow:0 18px 44px rgba(0,0,0,.34);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    font-family:Outfit,Inter,system-ui,sans-serif
  }
  #digiyPublicAudioReader .audioText{
    min-width:0;color:rgba(247,251,248,.76);font-size:12px;font-weight:900;
    line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
  }
  #digiyPublicAudioReader button{
    min-height:40px;border:none;border-radius:999px;padding:0 13px;cursor:pointer;
    font-family:inherit;font-size:12px;font-weight:1000;white-space:nowrap
  }
  #digiyPublicAudioReader .listenBtn{color:#062414;background:linear-gradient(135deg,#dcb45a,#f2cc78)}
  #digiyPublicAudioReader .stopBtn{
    color:#fecaca;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.22);display:none
  }
  #digiyPublicAudioReader.playing .listenBtn{display:none}
  #digiyPublicAudioReader.playing .stopBtn{display:inline-flex;align-items:center}

  #digiyPublicActionCamembert{
    position:fixed;left:14px;bottom:calc(86px + env(safe-area-inset-bottom,0px));
    width:84px;height:84px;z-index:99999;font-family:Outfit,Inter,system-ui,sans-serif
  }
  #digiyPublicActionCamembert .digiyPublicCenter{
    position:absolute;inset:0;width:84px;height:84px;border:none;border-radius:50%;
    cursor:pointer;color:#fff;box-shadow:0 18px 40px rgba(0,0,0,.34);
    background:radial-gradient(circle at center,rgba(6,19,15,.95) 0 42%,transparent 43%),
      conic-gradient(from -90deg,rgba(220,180,90,.96) 0 25%,rgba(18,183,106,.90) 25% 50%,rgba(56,189,248,.88) 50% 75%,rgba(168,85,247,.82) 75% 100%);
    overflow:hidden
  }
  #digiyPublicActionCamembert .digiyPublicCenter::before{
    content:"";position:absolute;inset:13px;border-radius:50%;background:rgba(6,19,15,.97);border:1px solid rgba(255,255,255,.10)
  }
  #digiyPublicActionCamembert .digiyPublicCenter span,
  #digiyPublicActionCamembert .digiyPublicCenter strong{position:relative;z-index:2;display:block;text-align:center}
  #digiyPublicActionCamembert .digiyPublicCenter span{font-size:20px;line-height:1;margin-bottom:2px}
  #digiyPublicActionCamembert .digiyPublicCenter strong{font-size:10.5px;font-weight:1000}

  #digiyPublicActionCamembert .digiyPublicMenu{
    position:absolute;left:94px;bottom:4px;width:248px;display:grid;grid-template-columns:1fr 1fr;gap:8px;
    padding:10px;border-radius:22px;border:1px solid rgba(255,255,255,.12);
    background:rgba(6,19,15,.94);box-shadow:0 18px 48px rgba(0,0,0,.32);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    opacity:0;transform:translateX(-8px) scale(.96);pointer-events:none;transition:.18s ease
  }
  #digiyPublicActionCamembert.open .digiyPublicMenu{opacity:1;transform:translateX(0) scale(1);pointer-events:auto}
  #digiyPublicActionCamembert .digiyPublicMenu a{
    min-height:44px;border:none;border-radius:15px;background:rgba(255,255,255,.07);color:#f7fbf8;
    padding:9px 10px;font-size:12px;font-weight:1000;text-decoration:none;display:inline-flex;
    align-items:center;justify-content:center;text-align:center;font-family:inherit
  }
  #digiyPublicActionCamembert .gold{background:linear-gradient(135deg,#dcb45a,#f2cc78)!important;color:#062414!important}
  #digiyPublicActionCamembert .green{background:rgba(18,183,106,.16)!important;color:#dffcea!important;border:1px solid rgba(18,183,106,.25)!important}
  #digiyPublicActionCamembert .blue{background:rgba(56,189,248,.14)!important;color:#d9f4ff!important;border:1px solid rgba(56,189,248,.24)!important}
  #digiyPublicActionCamembert .violet{background:rgba(168,85,247,.14)!important;color:#eadcff!important;border:1px solid rgba(168,85,247,.24)!important}

  @media(max-width:640px){
    #digiyPublicActionCamembert{left:10px;bottom:calc(84px + env(safe-area-inset-bottom,0px));width:76px;height:76px}
    #digiyPublicActionCamembert .digiyPublicCenter{width:76px;height:76px}
    #digiyPublicActionCamembert .digiyPublicCenter::before{inset:12px}
    #digiyPublicActionCamembert .digiyPublicMenu{left:0;bottom:86px;width:min(265px,calc(100vw - 20px))}
    #digiyPublicAudioReader{right:10px;left:96px;bottom:calc(92px + env(safe-area-inset-bottom,0px));max-width:none;justify-content:space-between}
    #digiyPublicAudioReader .audioText{font-size:11.5px}
  }
</style>

<script>
(function(){
  "use strict";

  const PRO = {
    cockpit:"https://pro-explore.digiylyfe.com/cockpit.html",
    lieux:"https://pro-explore.digiylyfe.com/lieux.html",
    submit:"https://pro-explore.digiylyfe.com/submit.html",
    pin:"https://pro-explore.digiylyfe.com/pin.html"
  };

  const AUDIO_TEXT =
    "Bienvenue dans DIGIY EXPLORE. Ici, on découvre le coin. Le public regarde, comprend vite, partage et contacte. Le professionnel pilote son lieu dans le cockpit sécurisé. Pas de téléphone dans la barre. Pas de repère interne dehors. Si tu veux gérer ton lieu, ouvre le cockpit. Si tu veux découvrir, reste sur la vitrine. Le terrain garde la main.";

  function cleanText(value){
    return String(value||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();
  }

  function setLink(node, href){
    if(!node) return;
    node.setAttribute("href", href);
    node.removeAttribute("target");
    node.removeAttribute("rel");
  }

  function removeOld(){
    ["#digiyExploreProCamembert","#digiyExploreAudioReader","#digiyPublicActionCamembert","#digiyPublicAudioReader"].forEach(function(sel){
      document.querySelectorAll(sel).forEach(function(n){n.remove()});
    });
  }

  function patchProLinks(){
    document.querySelectorAll('a[href="#proSection"], a[href*="#proSection"]').forEach(function(a){
      setLink(a, PRO.cockpit);
    });

    document.querySelectorAll("a,button").forEach(function(node){
      const t = cleanText(node.textContent);
      const cockpit = t.includes("mon lieu") || t.includes("ma fiche") || t.includes("espace pro") || t.includes("je veux montrer mon lieu") || t.includes("mon acces") || t.includes("cockpit");
      const lieux = t.includes("voir mes lieux") || t === "lieux" || t.includes("mes lieux");
      const add = t.includes("ajouter un lieu") || t === "ajouter";

      if(node.tagName === "A"){
        if(add) setLink(node, PRO.submit);
        else if(lieux) setLink(node, PRO.lieux);
        else if(cockpit) setLink(node, PRO.cockpit);
      }else if(node.tagName === "BUTTON" && (add || lieux || cockpit)){
        node.addEventListener("click", function(e){
          e.preventDefault();
          window.location.href = add ? PRO.submit : lieux ? PRO.lieux : PRO.cockpit;
        });
      }
    });
  }

  function markNotFound(){
    const t = cleanText(document.body.textContent);
    if(t.includes("lieu introuvable") || t.includes("aucun lieu public trouve")){
      document.body.classList.add("digiy-place-not-found");
    }
  }

  function cleanProHash(){
    try{
      const url = new URL(window.location.href);
      if(url.hash === "#proSection") history.replaceState({}, document.title, url.pathname + url.search);
    }catch(_){}
  }

  function make(html){
    const tpl = document.createElement("template");
    tpl.innerHTML = html.trim();
    return tpl.content.firstElementChild;
  }

  function installCamembert(){
    const root = make(`
      <div id="digiyPublicActionCamembert" aria-label="Actions DIGIY EXPLORE">
        <button class="digiyPublicCenter" id="digiyPublicCenter" type="button" aria-expanded="false">
          <span>🧭</span><strong>PRO</strong>
        </button>
        <div class="digiyPublicMenu">
          <a class="gold" href="${PRO.cockpit}">Cockpit</a>
          <a class="green" href="${PRO.lieux}">Mes lieux</a>
          <a class="blue" href="${PRO.submit}">Ajouter</a>
          <a class="violet" href="${PRO.pin}">PIN</a>
        </div>
      </div>
    `);
    document.body.appendChild(root);
    const center = document.getElementById("digiyPublicCenter");
    center && center.addEventListener("click", function(e){
      e.preventDefault();
      root.classList.toggle("open");
      center.setAttribute("aria-expanded", root.classList.contains("open") ? "true" : "false");
    });
    document.addEventListener("click", function(e){
      if(root && !root.contains(e.target)){
        root.classList.remove("open");
        center && center.setAttribute("aria-expanded","false");
      }
    });
  }

  function installAudio(){
    const reader = make(`
      <div id="digiyPublicAudioReader" aria-label="Lecteur audio DIGIY EXPLORE">
        <span class="audioText">Écouter DIGIY expliquer EXPLORE</span>
        <button class="listenBtn" id="digiyPublicAudioListen" type="button">🎧 Écouter</button>
        <button class="stopBtn" id="digiyPublicAudioStop" type="button">⏹ Stop</button>
      </div>
    `);
    document.body.appendChild(reader);

    const listen = document.getElementById("digiyPublicAudioListen");
    const stopBtn = document.getElementById("digiyPublicAudioStop");
    let playing = false;

    function setPlaying(v){ playing = !!v; reader.classList.toggle("playing", playing); }
    function stop(){ try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(_){} setPlaying(false); }
    function getVoice(){
      const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      return voices.find(v => /^fr/i.test(v.lang || "")) || null;
    }
    function speak(){
      if(!("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)){
        alert("Audio indisponible sur ce navigateur."); return;
      }
      if(playing){ stop(); return; }
      stop();
      const u = new SpeechSynthesisUtterance(AUDIO_TEXT);
      u.lang = "fr-FR"; u.rate = 0.86; u.pitch = 1.04; u.volume = 1;
      const v = getVoice(); if(v) u.voice = v;
      u.onstart = () => setPlaying(true);
      u.onend = () => setTimeout(stop,120);
      u.onerror = stop;
      window.speechSynthesis.speak(u);
    }

    listen && listen.addEventListener("click", speak);
    stopBtn && stopBtn.addEventListener("click", stop);
    if(window.speechSynthesis && typeof window.speechSynthesis.onvoiceschanged !== "undefined"){
      window.speechSynthesis.onvoiceschanged = getVoice;
    }
    window.addEventListener("beforeunload", stop);
    document.addEventListener("visibilitychange", function(){ if(document.hidden) stop(); });
  }

  function boot(){
    cleanProHash();
    removeOld();
    installCamembert();
    installAudio();
    patchProLinks();
    markNotFound();
    setTimeout(patchProLinks,500);
    setTimeout(patchProLinks,1500);
    setTimeout(markNotFound,800);
  }

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>
