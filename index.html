<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>MON ARGENT by DIGIY — PAY PRO</title>
  <meta name="theme-color" content="#f4ead2" />
  <meta
    name="description"
    content="PAY PRO by DIGIY — entrée sécurisée vers le cockpit Mon Argent, sans exposer la session dans l’adresse."
  />

  <script>
    window.DIGIY_MODULE = "PAY";
  </script>

  <style>
    :root{
      --bg:#f4ead2;
      --bg2:#ead9b7;
      --text:#1f2a1f;
      --muted:rgba(31,42,31,.74);
      --line:rgba(83,58,26,.22);
      --gold:#facc15;
      --green:#16a34a;
      --card:#fff7e6;
      --shadow:0 14px 34px rgba(77,52,22,.16);
      --ff:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
    }

    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:22px;
      font-family:var(--ff);
      color:var(--text);
      background:
        radial-gradient(circle at 10% 0%,rgba(250,204,21,.22),transparent 34%),
        radial-gradient(circle at 100% 100%,rgba(22,101,52,.10),transparent 30%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .card{
      width:min(100%,520px);
      border:2px solid var(--line);
      border-radius:30px;
      background:linear-gradient(160deg,rgba(255,250,238,.98),rgba(246,232,202,.96));
      box-shadow:var(--shadow);
      padding:24px;
      display:grid;
      gap:18px;
      text-align:center;
    }

    .mark{
      width:70px;
      height:70px;
      margin:0 auto;
      border-radius:24px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--green),var(--gold));
      color:#102014;
      font-size:34px;
      font-weight:1000;
      box-shadow:0 12px 28px rgba(77,52,22,.16);
    }

    .kicker{
      margin:0;
      color:#6b4e09;
      font-size:13px;
      font-weight:1000;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    h1{
      margin:0;
      font-size:clamp(34px,8vw,50px);
      line-height:1.02;
      letter-spacing:-.04em;
      font-weight:1000;
      color:#241a0d;
    }

    p{
      margin:0;
      color:var(--muted);
      font-size:18px;
      line-height:1.55;
      font-weight:900;
    }

    .btn{
      min-height:58px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 20px;
      text-decoration:none;
      background:linear-gradient(135deg,var(--gold),#fff3c4);
      color:#1f2a1f;
      border:1px solid rgba(121,83,12,.28);
      font-size:17px;
      font-weight:1000;
      box-shadow:0 10px 22px rgba(77,52,22,.13);
    }

    .small{
      color:rgba(31,42,31,.62);
      font-size:14px;
      font-weight:850;
      line-height:1.45;
    }

    .loader{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#14532d;
      font-size:15px;
      font-weight:1000;
    }

    .spinner{
      width:18px;
      height:18px;
      border:3px solid rgba(20,83,45,.18);
      border-top-color:#14532d;
      border-radius:50%;
      animation:spin .75s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }
  </style>
</head>

<body>
  <main class="card" aria-label="Entrée PAY PRO">
    <div class="mark">₣</div>

    <p class="kicker">PAY PRO · MON ARGENT by DIGIY</p>

    <h1>Ouverture du cockpit.</h1>

    <p>
      DIGIY prépare ton espace PAY.
      La session reste protégée, rien de sensible ne reste dans l’adresse.
    </p>

    <div class="loader" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <span>Direction cockpit…</span>
    </div>

    <a class="btn" href="./cockpit.html" id="manualLink">Ouvrir le cockpit</a>

    <div class="small">
      Si la page ne s’ouvre pas automatiquement, touche le bouton.
    </div>
  </main>

  <script>
    (() => {
      "use strict";

      const TARGET = "./cockpit.html";

      const SENSITIVE_KEYS = [
        "phone",
        "tel",
        "owner_phone",
        "owner_id",
        "slug",
        "pay_slug",
        "subscription_slug",
        "business_phone",
        "wave_phone",
        "wallet_phone",
        "pay_phone",
        "access_note",
        "keybox_code",
        "keybox_location",
        "module",
        "return",
        "from"
      ];

      function cleanVisibleUrl() {
        try {
          const url = new URL(window.location.href);
          let changed = false;

          SENSITIVE_KEYS.forEach((key) => {
            if (url.searchParams.has(key)) {
              url.searchParams.delete(key);
              changed = true;
            }
          });

          if (changed) {
            history.replaceState({}, document.title, url.pathname + url.search + url.hash);
          }
        } catch (_) {}
      }

      function cleanTarget() {
        try {
          const url = new URL(TARGET, window.location.href);

          SENSITIVE_KEYS.forEach((key) => {
            url.searchParams.delete(key);
          });

          if (url.origin !== window.location.origin) {
            return "./cockpit.html";
          }

          const file = url.pathname.split("/").pop() || "cockpit.html";
          return "./" + file + (url.search || "") + (url.hash || "");
        } catch (_) {
          return "./cockpit.html";
        }
      }

      function goCockpit() {
        const target = cleanTarget();

        const manual = document.getElementById("manualLink");
        if (manual) manual.setAttribute("href", target);

        window.setTimeout(() => {
          window.location.replace(target);
        }, 450);
      }

      cleanVisibleUrl();
      goCockpit();
    })();
  </script>
</body>
</html>
